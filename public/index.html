<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; }
    .icon { font-size: 5rem; margin-bottom: 1rem; }
    h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(90deg, #e94560, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { font-size: 1.2rem; color: #a0aec0; margin-bottom: 2rem; }
    .bar { width: 80px; height: 4px; background: linear-gradient(90deg, #e94560, #f5a623); margin: 0 auto 2rem; border-radius: 2px; }
    .tag { background: rgba(255,255,255,0.1); padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 0.9rem; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚧</div>
    <h1>Under Construction</h1>
    <div class="bar"></div>
    <p>We're working hard to bring you something amazing.<br>Stay tuned!</p>
    <div class="tag">Coming Soon</div>
  </div>
</body>
</html>
